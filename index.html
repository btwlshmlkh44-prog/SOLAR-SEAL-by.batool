<section class="hero">

        <h1>مرحباً بك في عالم الفقمة الذكية</h1>
        <p>
            أنا صديقتك الفقمة، سأرشدك نحو توفير الطاقة بذكاء واحترافية عالية

</html>
<script>
window.addEventListener("DOMContentLoaded", () => {
    // نبدأ الصفحة خارج الشاشة
    document.body.style.transform = "translateX(100%)";
    document.body.style.opacity = "0";
    // نضيف Transition سريع جداً
    document.body.style.transition = "transform 0.10s ease-out, opacity 0.35s ease-out";

    // بعد قليل نرجعها لمكانها الطبيعي
    setTimeout(() => {
        document.body.style.transform = "translateX(0)";
        document.body.style.opacity = "1";
    }, 50); // 50ms كافية لتفعيل الحركة
});
</script>
